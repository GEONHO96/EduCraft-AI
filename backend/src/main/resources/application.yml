spring:
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8080

---
# 로컬 개발 프로필
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:educraftai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

jwt:
  secret: educraftai-local-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

ai:
  api-key: ${AI_API_KEY:your-api-key-here}
  model: claude-sonnet-4-20250514

---
# Docker 프로필
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET:educraftai-production-jwt-secret-key-must-be-at-least-256-bits}
  expiration: 86400000

ai:
  api-key: ${AI_API_KEY}
  model: claude-sonnet-4-20250514

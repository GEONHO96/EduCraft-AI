spring:
  profiles:
    active: local

  ai:
    anthropic:
      api-key: ${AI_API_KEY:your-api-key-here}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# 파일 업로드 설정
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

file:
  upload-dir: ./uploads

---
# 로컬 개발 프로필
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:educraftai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

jwt:
  secret: educraftai-local-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

social:
  naver:
    client-id: ZsTK1qXQouaeK9jzWd6z
    client-secret: PGTPS01rZZ
  kakao:
    client-id: "1429142"

---
# Docker 프로필
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: 6379

  ai:
    anthropic:
      api-key: ${AI_API_KEY}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET:educraftai-production-jwt-secret-key-must-be-at-least-256-bits}
  expiration: 86400000

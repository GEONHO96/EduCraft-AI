version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: educraftai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: educraftai
      MYSQL_USER: educraft
      MYSQL_PASSWORD: educraft1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: educraftai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educraftai-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/educraftai?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: educraft
      SPRING_DATASOURCE_PASSWORD: educraft1234
      SPRING_DATA_REDIS_HOST: redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: educraftai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
